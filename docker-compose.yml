services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: /api
        VITE_DEFAULT_TENANT_SLUG: ${VITE_DEFAULT_TENANT_SLUG:-demo}
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  notifications-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    command: ["python", "backend/scripts/notifications_worker.py", "--limit", "50", "--poll-seconds", "10"]
    depends_on:
      - backend
    restart: unless-stopped
