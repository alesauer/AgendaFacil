services:
  backend:
    image: ghcr.io/${GHCR_IMAGE_PREFIX}/backend:${IMAGE_TAG:-latest}
    env_file:
      - backend/.env
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    image: ghcr.io/${GHCR_IMAGE_PREFIX}/frontend:${IMAGE_TAG:-latest}
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  notifications-worker:
    image: ghcr.io/${GHCR_IMAGE_PREFIX}/backend:${IMAGE_TAG:-latest}
    env_file:
      - backend/.env
    command: ["python", "backend/scripts/notifications_worker.py", "--limit", "50", "--poll-seconds", "10"]
    depends_on:
      - backend
    restart: unless-stopped
